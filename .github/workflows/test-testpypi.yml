name: Test Package from TestPyPI

on:
    workflow_run:
        workflows: ["CD - Publish Release to TestPyPI"]
        types: [completed]

jobs:
    test_install:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest

        steps:

      # 🔗 Tie job to the exact commit
        - name: Checkout repository
          uses: actions/checkout@v4
          with:
            ref: ${{ github.event.workflow_run.head_sha }}

        - name: Set up Python
          uses: actions/setup-python@v5
          with: 
            python-version: "3.11"

        - name: Install taivium from TestPyPI
          run: |
            VERSION=$(curl -s https://test.pypi.org/pypi/taivium/json | python -c "import sys, json; print(json.load(sys.stdin)['info']['version'])")

            for i in {1..12}; do
                echo "Installing taivium==$VERSION"

                if pip install \
                    --no-cache-dir \
                    --index-url https://test.pypi.org/simple/ \
                    --extra-index-url https://pypi.org/simple \
                    taivium=="$VERSION"; then
                    echo "✅ Installed successfully"
                    exit 0
                fi

                echo "Retry $i..."
                sleep 10
            done

            echo "❌ Failed to install"
            exit 1

        - name: Verify installation
          run: python -c "import taivium; print('Installed version:', taivium.__version__)"

        - name: Download spaCy model
          run: python -m spacy download en_core_web_sm

        - name: Run example script
          run: |
            python - << 'EOF'
            from taivium.engine import Taivium

            text = "Alice Johnson from Acme Corp emailed alice@acme.com."
            result = Taivium().process(text)

            assert "PERSON_" in result["anonymized"]
            print("✅ Example ran successfully")
            EOF
