name: CD - Publish Release to TestPyPI

on:
  push:
    tags:
      - "v*"
    branches:
      - test-pypi
  workflow_dispatch:

jobs:
  build_and_publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/taivium

    permissions:
      contents: read        # required for checkout
      id-token: write       # required for PyPI trusted publishing

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify version matches tag
        shell: bash
        run: |
          VERSION=$(python -c "import tomllib; f=open('pyproject.toml','rb'); print(tomllib.load(f)['project']['version'])")
          TAG=${GITHUB_REF#refs/tags/v}
          echo "Version: $VERSION"
          echo "Tag: $TAG"

          if [ "$VERSION" != "$TAG" ]; then
            echo "Version mismatch!"
            exit 1
          fi

      - name: Build package (wheel + sdist)
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  test_install:
    needs: build_and_publish
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install taivium from TestPyPI
        run: |
          VERSION=$(curl -s https://test.pypi.org/pypi/taivium/json | python -c "import sys, json; print(json.load(sys.stdin)['info']['version'])")

          for i in {1..12}; do
              echo "Installing taivium==$VERSION"

              if pip install \
                  --no-cache-dir \
                  --index-url https://test.pypi.org/simple/ \
                  --extra-index-url https://pypi.org/simple \
                  taivium==$VERSION; then
                  echo "✅ Installed successfully"
                  exit 0
              fi

              echo "Retry $i..."
              sleep 10
          done

          echo "❌ Failed to install"
          exit 1

      - name: Verify installation
        run: python -c "import taivium; print('Installed version:', taivium.__version__)"

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run example script
        run: |
          python - << 'EOF'
          from taivium.engine import Taivium

          text = "Alice Johnson from Acme Corp emailed alice@acme.com."
          result = Taivium().process(text)

          assert "PERSON_" in result["anonymized"]
          print("✅ Example ran successfully")
          EOF
         