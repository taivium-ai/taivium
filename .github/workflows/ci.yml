name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  ci:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # --- RUST TOOLCHAIN SETUP ---
      - name: Set up older Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.70.0

      # --- PIP & WHEEL CACHING ---
      - name: Get Pip Cache Dir
        id: pip-cache
        run: |
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

      - name: Cache Pip Packages and Wheels
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pip-cache.outputs.dir }}
            ~/.cache/pip
          # Unique key based on OS, Python version, and dependency files
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      # --- INSTALL DEPENDENCIES ---
      - name: Install dependencies
        env:
          RUSTFLAGS: "-A invalid_reference_casting"
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Install CPU-only torch to keep CI fast
          pip install torch==$(grep -oP '(?<=torch==)\S+' requirements.txt) \
            --index-url https://download.pytorch.org/whl/cpu
          pip install click
          pip install -r requirements.txt -r requirements-test.txt
          pip install coverage

      - name: Pylint
        run: python -m pylint ./src --fail-under=8.0

      - name: Run tests with coverage
        run: |
          python -m coverage run -m pytest tests/ -q
          python -m coverage report \
            --include="src/taivium/*" \
            --show-missing \
            --fail-under=90

      - name: Upload coverage artifact
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage