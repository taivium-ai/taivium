name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  ci:
    name: Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04, macos-15, macos-26]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # --- RUST TOOLCHAIN SETUP ---
      - name: Set up older Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.70.0

      # --- PIP & WHEEL CACHING ---
      - name: Get Pip Cache Dir
        id: pip-cache
        run: |
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT
      - name: Cache Pip Packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
      # --- RUST CACHING ---
      # This saves the cargo target directory so your tokenizer doesn't rebuild from scratch
      - name: Cache Rust Build Artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "."

      # --- INSTALL DEPENDENCIES ---
      - name: Install dependencies
        env:
          RUSTFLAGS: "-A invalid_reference_casting"
        run: |
          python -m pip install --upgrade pip setuptools wheel pylint coverage pytest
          pip install click
          pip install -r requirements.txt -r requirements-test.txt \
            --extra-index-url https://download.pytorch.org/whl/cpu
            # --- LINTING ---
      - name: Pylint
        run: python -m pylint ./src --fail-under=9.7

      # --- TESTING & COVERAGE GENERATION ---
      - name: Run tests with coverage
        run: |
          python -m coverage run -m pytest tests/ -q
          # Generate XML report explicitly for Codecov compatibility
          python -m coverage xml -o coverage.xml
          # Run the console report verification step
          python -m coverage report \
            --include="src/taivium/*" \
            --show-missing \
            --fail-under=90
      # --- UPLOAD TO CODECOV ---
      # Runs on Python 3.13 unless the workflow was completely cancelled via UI
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && matrix.python-version == '3.13' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml