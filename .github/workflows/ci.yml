name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  ci:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # --- RUST TOOLCHAIN SETUP ---
      - name: Set up older Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.70.0

      # --- PIP & WHEEL CACHING ---
      - name: Get Pip Cache Dir
        id: pip-cache
        run: |
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

      # Cleaned up redundant path entries; pip cache dir covers it perfectly
      - name: Cache Pip Packages and Wheels
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      # --- INSTALL DEPENDENCIES ---
      - name: Install dependencies
        env:
          RUSTFLAGS: "-A invalid_reference_casting"
        run: |
          python -m pip install --upgrade pip setuptools wheel pylint coverage pytest
          
          # Safer fallback for CPU PyTorch installation
          TORCH_VER=$(python -c "import re; f=open('requirements.txt').read(); m=re.search(r'torch==([\d\.]+)', f); print(m.group(1))" 2>/dev/null || echo "2.2.0")
          pip install torch==$TORCH_VER --index-url https://download.pytorch.org/whl/cpu
          
          pip install click
          pip install -r requirements.txt -r requirements-test.txt

      - name: Pylint
        run: python -m pylint ./src --fail-under=8.0

      - name: Run tests with coverage
        run: |
          python -m coverage run -m pytest tests/ -q
          # 1. Generate XML report so Codecov can easily read it
          python -m coverage xml -o coverage.xml
          # 2. Keep your console summary check
          python -m coverage report \
            --include="src/taivium/*" \
            --show-missing \
            --fail-under=90

      # --- UPLOAD TO CODECOV ---
      - name: Upload coverage to Codecov
        # Run on Python 3.13 if tests passed, or if tests failed (but not if completely cancelled)
        if: ${{ !cancelled() && matrix.python-version == '3.13' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
          verbose: true