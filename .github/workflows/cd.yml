name: CD - Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # 1. BUILD WHEELS FOR ALL PLATFORMS
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Ensure Python exists for verification script
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify version matches tag
        shell: bash
        run: |
          VERSION=$(python -c "import tomllib; f=open('pyproject.toml','rb'); print(tomllib.load(f)['project']['version'])" 2>/dev/null || grep '^version' pyproject.toml | head -n1 | cut -d'"' -f2)
          TAG=${GITHUB_REF#refs/tags/v}
          echo "Version: $VERSION"
          echo "Tag: $TAG"
          if [ "$VERSION" != "$TAG" ]; then
            echo "❌ Version mismatch!"
            exit 1
          fi

      - name: Set up QEMU (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: docker/setup-qemu-action@v3

      # Install Rust on Host runner (Mac & Windows)
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Add macOS cross targets for universal2 package compilation
      - name: Add macOS targets
        if: matrix.os == 'macos-latest'
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Build Wheels via cibuildwheel
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"

          # Upgrades pip inside the specific Python virtual environments safely
          CIBW_BEFORE_BUILD: "python -m pip install --upgrade pip"

          # Install Rust inside isolated Linux containers
          CIBW_BEFORE_BUILD_LINUX: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"

          # Cross-platform environment configuration (Fixed paths)
          CIBW_ENVIRONMENT_LINUX: PATH="$PATH:/root/.cargo/bin" RUSTFLAGS="-A invalid_reference_casting"
          CIBW_ENVIRONMENT_MACOS: PATH="$PATH:$HOME/.cargo/bin" RUSTFLAGS="-A invalid_reference_casting" ARCHFLAGS="-arch x86_64 -arch arm64"
          CIBW_ENVIRONMENT_WINDOWS: PATH="$PATH;$USERPROFILE/.cargo/bin" RUSTFLAGS="-A invalid_reference_casting"

          # Test wheels
          CIBW_TEST_REQUIRES: "pytest click"
          CIBW_TEST_COMMAND: "pytest {project}/tests"

          # Architectures
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          CIBW_ARCHS_MACOS: "universal2"

      - name: Upload Wheels as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # 2. BUILD SOURCE DISTRIBUTION
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

