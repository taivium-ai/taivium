name: CD - Publish Release

on:
  workflow_dispatch:

jobs:
  build_and_publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/taivium

    permissions:
      contents: read        # equired for checkout
      id-token: write       # equired for PyPI trusted publishing

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify version matches tag
        shell: bash
        run: |
          VERSION=$(python -c "import tomllib; f=open('pyproject.toml','rb'); print(tomllib.load(f)['project']['version'])")
          TAG=${GITHUB_REF#refs/tags/v}
          echo "Version: $VERSION"
          echo "Tag: $TAG"

          if [ "$VERSION" != "$TAG" ]; then
            echo "Version mismatch!"
            exit 1
          fi

      - name: Build package (wheel + sdist)
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true