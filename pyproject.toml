[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

# Project metadata
[project]
name = "taivium"
version = "0.0.1"
license = {text = "MIT"}
requires-python = ">=3.7"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent"
]
[project.optional-dependencies]
dev = ["pytest", "flake8", "tox"]
[project.scripts]
taivium = "taivium.main:main"